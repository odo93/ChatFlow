<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="wavePattern" x="0" y="0" width="360" height="140" patternUnits="userSpaceOnUse">
      <!-- Wave layer 1 – subtle white, low opacity -->
      <path d="M0 70 C45 20, 90 120, 135 70 S225 20, 270 70 S360 120, 360 70"
            fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
      <!-- Wave layer 2 – offset -->
      <path d="M0 100 C40 55, 85 145, 130 100 S220 55, 265 100 S355 145, 360 100"
            fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
      <!-- Wave layer 3 – yellow accent, very faint -->
      <path d="M0 40 C50 5, 95 75, 140 40 S235 5, 280 40 S355 75, 360 40"
            fill="none" stroke="rgba(255,216,68,0.07)" stroke-width="1"/>
    </pattern>

    <!-- Radial gradient overlay to give depth -->
    <radialGradient id="radialOverlay" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#145D46" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#184133" stop-opacity="0"/>
    </radialGradient>

    <!-- Diagonal line texture -->
    <pattern id="diagonalHatch" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base background filled by brand-green via CSS; SVG provides pattern overlay only -->
  <rect width="1440" height="560" fill="transparent"/>

  <!-- Diagonal hatch texture -->
  <rect width="1440" height="560" fill="url(#diagonalHatch)"/>

  <!-- Wave pattern tiled across full canvas -->
  <rect width="1440" height="560" fill="url(#wavePattern)"/>

  <!-- Decorative large wave arcs -->
  <path d="M-100 420 C200 340, 400 500, 700 400 S1100 280, 1540 380"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3"/>
  <path d="M-100 460 C250 370, 500 520, 760 430 S1150 320, 1540 430"
        fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>
  <path d="M-100 500 C300 410, 600 560, 820 480 S1200 360, 1540 480"
        fill="none" stroke="rgba(255,216,68,0.06)" stroke-width="2"/>

  <!-- Top curves -->
  <path d="M0 80 C180 20, 360 140, 540 80 S900 20, 1080 80 S1350 140, 1440 80"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2.5"/>

  <!-- Radial depth overlay -->
  <rect width="1440" height="560" fill="url(#radialOverlay)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="1440" height="560" fill="url(#dots)"/>
</svg>
